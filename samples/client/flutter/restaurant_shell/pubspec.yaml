# A2UI Restaurant Finder - Flutter client (Lit-style chat + A2UI surface).
# Run with: flutter run -d chrome (or -d ios, -d android)
# 학습 포인트:
# - `genui`/`genui_a2ui` 조합이 "A2UI JSON -> Flutter 위젯" 렌더링 핵심이다.
# - 에이전트 URL 기본값은 코드(`lib/config/app_config.dart`)에 있고,
#   Android 에뮬레이터는 런타임 `--dart-define=AGENT_URL=...`로 덮어쓴다.
name: restaurant_shell
description: A2UI Restaurant Finder client for Flutter. Chat input + A2UI rendering (web, iOS, Android).
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.35.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  genui: ^0.7.0
  genui_a2ui: ^0.7.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# genui/genui_a2ui 가 meta <1.18.0 을 요구하지만 meta 1.18.x 는 하위 호환.
# override 없이 두면 "try flutter pub outdated" 경고가 뜨므로 강제 적용.
dependency_overrides:
  meta: ^1.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/hero.png
    - assets/hero-dark.png
